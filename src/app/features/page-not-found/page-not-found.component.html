<div class="not-found-container">
  <div class="not-found-content">
    <!-- 404 Illustration -->
    <div class="illustration" role="img" aria-label="404 Error - Page not found">
      <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Magnifying Glass -->
        <circle cx="80" cy="80" r="40" stroke="currentColor" stroke-width="4" fill="none"/>
        <line x1="110" y1="110" x2="140" y2="140" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        
        <!-- Question Mark -->
        <path d="M75 70 Q80 60, 85 70 L85 75" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"/>
        <circle cx="85" cy="85" r="2" fill="currentColor"/>
        
        <!-- Alert Circle -->
        <circle cx="150" cy="50" r="15" stroke="var(--color-danger)" stroke-width="3" fill="none"/>
        <line x1="150" y1="43" x2="150" y2="52" stroke="var(--color-danger)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="150" cy="57" r="1.5" fill="var(--color-danger)"/>
      </svg>
    </div>

    <!-- Error Message -->
    <div class="error-content">
      <h1 class="error-code">404</h1>
      <h2 class="error-title">Page Not Found</h2>
      <p class="error-message">
        Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
      </p>
    </div>

    <!-- Countdown -->
    <div class="countdown-message" role="status" aria-live="polite">
      <p>Redirecting to home page in <strong>{{ countdown() }}</strong> seconds...</p>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button
        type="button"
        class="button button--primary"
        (click)="goHome()"
        aria-label="Go to home page"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 22V12h6v10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Go to Home
      </button>

      <button
        type="button"
        class="button button--secondary"
        (click)="goBack()"
        aria-label="Go back to previous page"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Go Back
      </button>
    </div>

    <!-- Helpful Links -->
    <div class="helpful-links">
      <h3 class="links-title">Looking for something?</h3>
      <nav aria-label="Quick navigation links">
        <ul class="links-list">
          <li>
            <a href="/catalog" class="link">Browse Catalog</a>
          </li>
          <li>
            <a href="/cart" class="link">View Cart</a>
          </li>
          <li>
            <a href="/favorites" class="link">My Favorites</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>
