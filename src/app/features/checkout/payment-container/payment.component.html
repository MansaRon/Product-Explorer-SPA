<div class="step-container">
  <div class="step-header">
    <h1 class="step-title">Payment Method</h1>
    <p class="step-description">How would you like to pay?</p>
  </div>

  <app-payment-options 
    [initialData]="initialData()"
    [submitTrigger]="submitTrigger()"
    (formValidity)="handleValidilityChange($event)" 
    (methodSelected)="handleMethodSelected($event)" />

  <app-footer
    backLabel="Back to Delivery"
    forwardLabel="Continue to Review"
    [forwardDisabled]="!isFormValid()"
    [isSubmitting]="isSubmitting()"
    (backClick)="handleBack()"
    (forwardClick)="handleContinue()" />
</div>
