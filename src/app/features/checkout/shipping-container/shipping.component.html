<div class="step-container">
  <div class="step-header">
    <h1 class="step-title">Shipping Information</h1>
    <p class="step-description">Where should we deliver your order?</p>
  </div>

  <app-shipping 
    [initialData]="initialData()"
    [submitTrigger]="submitTrigger()"
    (formSubmit)="handleSubmit($event)"
    (formValidility)="handleValidilityChange($event)" />

  <app-footer
    backLabel="Back to Cart"
    forwardLabel="Continue to Delivery"
    [forwardDisabled]="!isFormValid()"
    [isSubmitting]="isSubmitting()"
    (backClick)="handleCancel()"
    (forwardClick)="handleContinue()" />
</div>
