<div class="checkout-container">
  <!-- Progress Bar -->
  <div class="progress-bar" role="progressbar" [attr.aria-valuenow]="progressPercentage()" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-fill" [style.width.%]="progressPercentage()"></div>
  </div>

  <!-- Step Navigator -->
  <nav class="step-navigator" aria-label="Checkout steps">
    <ol class="steps-list">
      @for (step of steps(); track step.id) {
        <li class="step-item" [class.step-item--active]="step.isActive" [class.step-item--completed]="step.isCompleted">
          <button
            type="button"
            class="step-button"
            [disabled]="!step.isCompleted && !step.isActive"
            (click)="goToStep(step.id, step.route)"
            [attr.aria-current]="step.isActive ? 'step' : null"
            [attr.aria-label]="step.label + ' step' + (step.isCompleted ? ', completed' : '')">
            <span class="step-icon" aria-hidden="true">
              @if (step.isCompleted) {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="M20 6L9 17l-5-5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              } @else if (step.icon === 'truck') {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="M16 3h5v13h-2M16 16H3V4h13v12z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="7.5" cy="19.5" r="2.5" stroke-width="2"/>
                  <circle cx="16.5" cy="19.5" r="2.5" stroke-width="2"/>
                </svg>
              } @else if (step.icon === 'calendar') {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <rect x="3" y="4" width="18" height="18" rx="2" stroke-width="2"/>
                  <path d="M16 2v4M8 2v4M3 10h18" stroke-width="2" stroke-linecap="round"/>
                </svg>
              } @else if (step.icon === 'card') {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <rect x="1" y="4" width="22" height="16" rx="2" stroke-width="2"/>
                  <path d="M1 10h22" stroke-width="2"/>
                </svg>
              } @else {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="M20 6L9 17l-5-5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              }
            </span>
            <span class="step-label">{{ step.label }}</span>
          </button>
        </li>
      }
    </ol>
  </nav>

  <!-- Step Content -->
  <main class="checkout-content" id="checkout-main">
    <router-outlet />
  </main>
</div>
