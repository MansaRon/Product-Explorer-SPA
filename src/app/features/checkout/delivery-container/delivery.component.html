<div class="step-container">
  <div class="step-header">
    <h1 class="step-title">Delivery Method</h1>
    <p class="step-description">Choose how fast you want your order</p>
  </div>

  <app-options [options]="deliveryOptions" [selectedOptionId]="selectedOptionId()" (optionSelected)="handleOptionSelected($event)" />

  <div class="form-actions">
    <button type="button" class="button button--secondary" (click)="handleBack()">Back</button>
    <button type="button" class="button button--primary" [disabled]="!selectedOption()" (click)="handleContinue()">Continue to payment</button>
  </div>
</div>
