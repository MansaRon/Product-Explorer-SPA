<div class="step-container">
  <div class="step-header">
    <h1 class="step-title">Review Your Order</h1>
    <p class="step-description">Please review your order before placing it</p>
  </div>

  @if (summaryData(); as data) {
    <app-order 
      [summary]="data" 
      (editShipping)="handleEditShipping()" 
      (editDelivery)="handleEditDelivery()" 
      (editPayment)="handleEditPayment()" />
  }

  <app-footer
    backLabel="Back to Payment"
    forwardLabel="Place an order"
    [isSubmitting]="isSubmitting()"
    (backClick)="handleBack()"
    (forwardClick)="handlePlaceOrder()" />
</div>
