<div class="checkout-footer">
  <div class="footer-content">
    <div class="footer-actions">
      @if (showBackButton()) {
      <button
        type="button"
        class="footer-button footer-button--secondary"
        [disabled]="backDisabled()"
        (click)="handleBackClick()"
        [attr.aria-label]="backLabel()">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          aria-hidden="true">
          <path
            d="M19 12H5M12 19l-7-7 7-7"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>

        <span>{{ backLabel() }}</span>
      </button>
      }
      @if (!showBackButton()) {
        <div class="footer-spacer"></div>
      }

      <button
        type="button"
        class="footer-button footer-button--primary"
        [disabled]="forwardDisabled() || isSubmitting()"
        (click)="handleForwardClick()"
        [attr.aria-label]="isSubmitting() ? 'Processing' : forwardLabel()">
        <span>
          {{ isSubmitting() ? "Processing..." : forwardLabel() }}
        </span>

        @if (!isSubmitting()) {
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          aria-hidden="true">
          <path
            d="M5 12h14M12 5l7 7-7 7"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        }

        @if (isSubmitting()) {
        <svg
          class="spinner"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          aria-hidden="true">
          <circle
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
            stroke-opacity="0.25" />
          <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
        </svg>
        }
      </button>
    </div>
  </div>
</div>
