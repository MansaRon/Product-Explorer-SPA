version: '3.8'

services:
  # Angular Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-explorer
    ports:
      - "4200:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - ecommerce-network

  # Optional: Add backend service here when ready
  # backend:
  #   image: your-backend-image:latest
  #   container_name: ecommerce-backend
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - SPRING_PROFILES_ACTIVE=prod
  #   networks:
  #     - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge